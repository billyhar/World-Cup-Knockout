# Cloudflare Worker for the live-cursor relay (worker/server.js).
# Deploy to your own Cloudflare account:  npm run cursors:deploy
name = "world-cup-cursors"
main = "worker/server.js"
compatibility_date = "2025-06-01"

# 1-minute cron that drives the live-score poller on Vercel (worker's scheduled
# handler pings /api/poll-live). Replaces the old Netlify scheduled function,
# which Vercel's free plan can't reproduce.
[triggers]
crons = ["* * * * *"]

[[durable_objects.bindings]]
name = "CURSORS"
class_name = "CursorsRoom"

# SQLite-backed Durable Object class — required for the Workers free plan.
# (We don't store anything; the class just coordinates the WebSockets.)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["CursorsRoom"]

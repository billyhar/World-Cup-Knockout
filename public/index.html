<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026 — Groups &amp; Knockout Canvas</title>
<meta name="description" content="Every group, result and knockout match of the 2026 FIFA World Cup on one pannable canvas. Live scores, group standings, and full bracket.">
<link rel="canonical" href="https://worldcupknockout.football/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://worldcupknockout.football/">
<meta property="og:title" content="World Cup 2026 — Groups & Knockout Canvas">
<meta property="og:description" content="All 104 matches, 12 groups and the full knockout bracket on one pannable canvas. Live scores updated every 60 seconds.">
<meta property="og:image" content="https://worldcupknockout.football/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="World Cup 2026 — Groups & Knockout Canvas">
<meta name="twitter:description" content="All 104 matches, 12 groups and the full knockout bracket on one pannable canvas. Live scores updated every 60 seconds.">
<meta name="twitter:image" content="https://worldcupknockout.football/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽️</text></svg>">
<link rel="preload" href="/data/seed.json" as="fetch" crossorigin>
<link rel="stylesheet" href="/css/styles.css">
<script defer src="https://cloud.umami.is/script.js" data-website-id="c63b4d7f-d188-4b09-87df-bbcbb0b744a8"></script>
</head>
<body>
  <div id="viewport">
    <div id="rotor">
      <div id="world"></div>
    </div>
  </div>

  <header class="chrome chrome-top">
    <div class="brand">
      <span class="brand-ball">⚽️</span>
      <div class="brand-text">
        <strong>World Cup 2026</strong>
        <span>Canada · Mexico · USA</span>
      </div>
    </div>
    <nav class="nav-chips" id="nav-chips">
      <button data-goto="r32">R32</button>
      <button data-goto="r16">R16</button>
      <button data-goto="qf">QF</button>
      <button data-goto="sf">SF</button>
      <button data-goto="final">F</button>
    </nav>
    <nav class="nav-chips side-chips" id="side-chips" hidden>
      <button data-side="1">Side 1</button>
      <button data-side="2">Side 2</button>
    </nav>
  </header>

  <div class="chrome chrome-zoom">
    <button id="rotate" aria-label="Rotate canvas">⟳</button>
    <button id="zoom-in" aria-label="Zoom in">+</button>
    <button id="zoom-fit" aria-label="Fit everything">⤢</button>
    <button id="zoom-out" aria-label="Zoom out">−</button>
  </div>

  <div class="chrome chrome-status" id="status-pill" hidden></div>

  <div class="hint" id="hint">drag to pan · pinch or ⌘ + scroll to zoom</div>

  <div class="rotate-tip" id="rotate-tip" hidden>
    <span>Tap ⟳ and turn your phone to see the whole bracket</span>
    <button id="rotate-tip-close" aria-label="Dismiss">✕</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>

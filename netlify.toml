[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "https://www.worldcupknockout.football/*"
  to = "https://worldcupknockout.football/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/.well-known/api-catalog"
  to = "/.netlify/functions/api-catalog"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Agent/AI discovery (RFC 8288): point crawlers at the API catalog and the
    # machine-readable site summary.
    Link = "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\", </llms.txt>; rel=\"describedby\"; type=\"text/plain\""

[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/data/seed.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/og.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
